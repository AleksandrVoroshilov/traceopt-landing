  :root {
    --bg: #F4F1EA;
    --ink: #14120F;
    --accent: #D85A1B;
    --paper: #FAF7F0;
  }
  
  body {
    background: var(--bg);
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }

  .hero-right {
    width: 100%;
    max-width: 720px;
    aspect-ratio: 1 / 1;
    background: var(--paper);
    border: 1px solid #D9D3C4;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 40px -10px rgba(20,18,15,.15);
  }

  svg { width: 100%; height: 100%; display: block; }

  /* BASE */
  .layer-base g path {
    stroke: #14120F;
    stroke-width: 4.2;
    stroke-linejoin: round;
    stroke-linecap: round;
    fill: none;
    opacity: 0.19;
    vector-effect: non-scaling-stroke;
  }

  /* MAIN */
  .layer-main g path {
    stroke: var(--accent);
    stroke-width: 6.2;
    stroke-linejoin: round;
    stroke-linecap: round;
    fill: none;
    filter: drop-shadow(0 0 6px var(--accent));
    vector-effect: non-scaling-stroke;
    transition: stroke-width .09s ease, filter .12s ease;
  }

  /* ACTIVE (вся группа) */
  .layer-main g.active path {
    stroke-width: 8.1;
    filter: drop-shadow(0 0 16px var(--accent));
  }

  /* HIGHLIGHT */
  .layer-highlight g path {
    stroke: #fff;
    stroke-width: 0.5;
    stroke-linejoin: round;
    stroke-linecap: round;
    fill: none;
    opacity: 0.48;
    vector-effect: non-scaling-stroke;
  }

  .controls {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(244,241,234,.92);
    backdrop-filter: blur(12px);
    border: 1px solid #D9D3C4;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 10;
  }
</style>

<script>
  const svg = document.getElementById('hero-network');
  const original = document.getElementById('original-paths');

  function createLayers() {
    const baseG = document.createElementNS("http://www.w3.org/2000/svg", "g");
    baseG.className.baseVal = "layer-base";
    baseG.innerHTML = original.innerHTML;
    svg.appendChild(baseG);

    const mainG = document.createElementNS("http://www.w3.org/2000/svg", "g");
    mainG.className.baseVal = "layer-main";
    mainG.innerHTML = original.innerHTML;
    svg.appendChild(mainG);

    const highlightG = document.createElementNS("http://www.w3.org/2000/svg", "g");
    highlightG.className.baseVal = "layer-highlight";
    highlightG.innerHTML = original.innerHTML;
    svg.appendChild(highlightG);

    original.remove();
  }

  createLayers();

  let activeGroup = null;

  svg.addEventListener('mousemove', (e) => {
    const rect = svg.getBoundingClientRect();
    const mouseX = ((e.clientX - rect.left) / rect.width) * 1024;
    const mouseY = ((e.clientY - rect.top) / rect.height) * 1024;

    let closestGroup = null;
    let minDist = Infinity;

    const groups = document.querySelectorAll('.layer-main g[id^="Group"]');

    groups.forEach(group => {
      let groupMinDist = Infinity;
      group.querySelectorAll('path').forEach(path => {
        const totalLength = path.getTotalLength();
        for (let i = 0; i <= 8; i++) {
          const point = path.getPointAtLength((totalLength / 8) * i);
          const dist = Math.hypot(mouseX - point.x, mouseY - point.y);
          if (dist < groupMinDist) groupMinDist = dist;
        }
      });

      if (groupMinDist < minDist) {
        minDist = groupMinDist;
        closestGroup = group;
      }
    });

    if (closestGroup && closestGroup !== activeGroup) {
      if (activeGroup) activeGroup.classList.remove('active');
      closestGroup.classList.add('active');
      activeGroup = closestGroup;
    }
  });

  svg.addEventListener('mouseleave', () => {
    if (activeGroup) {
      activeGroup.classList.remove('active');
      activeGroup = null;
    }
  });

  document.getElementById('accent-picker').addEventListener('input', e => {
    document.documentElement.style.setProperty('--accent', e.target.value);
  });
</script>
